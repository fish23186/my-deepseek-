<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek 智能助理</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-main: #f7f9fc;
            --bg-sidebar: #1e1e24;
            --bg-chat: #ffffff;
            --text-main: #333333;
            --text-light: #666666;
            --primary: #2f54eb;
            --border: #e8e8e8;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #141414;
                --bg-sidebar: #0f0f11;
                --bg-chat: #1f1f1f;
                --text-main: #e8e8e8;
                --text-light: #a6a6a6;
                --primary: #177ddc;
                --border: #303030;
            }
        }
        body {
            font-family: -apple-system, sans-serif;
            margin: 0; padding: 0;
            display: flex; height: 100vh;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
        }
        /* 侧边栏样式 */
        #sidebar {
            width: 260px; background-color: var(--bg-sidebar);
            color: #ffffff; display: flex; flex-direction: column;
            transition: transform 0.3s ease; z-index: 10;
        }
        .new-chat-btn {
            margin: 16px; padding: 12px; border: 1px solid #434343;
            border-radius: 8px; background: transparent; color: white;
            cursor: pointer; font-weight: bold; text-align: left;
        }
        .new-chat-btn:hover { background: #262626; }
        #history-list { flex: 1; overflow-y: auto; padding: 0 12px; }
        .history-item {
            padding: 10px 12px; border-radius: 6px; margin-bottom: 4px;
            cursor: pointer; font-size: 14px; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; display: flex; justify-content: space-between;
        }
        .history-item:hover, .history-item.active { background: #333339; }
        .delete-btn { color: #ff4d4f; opacity: 0; border: none; background: transparent; cursor: pointer; }
        .history-item:hover .delete-btn { opacity: 1; }

        /* 主聊天区 */
        #main-container { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); position: relative; }
        header {
            background-color: var(--bg-chat); padding: 10px 16px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; word-break: break-word; }
        .msg.user { background-color: var(--primary); color: white; align-self: flex-end; }
        .msg.assistant { background-color: var(--bg-chat); align-self: flex-start; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        #input-area { padding: 16px; background: var(--bg-chat); border-top: 1px solid var(--border); display: flex; gap: 8px; }
        #user-input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); font-size: 16px; }
        .btn { padding: 12px 20px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        
        #key-btn { font-size: 12px; padding: 6px 12px; background: #52c41a; color: white; border-radius: 20px; cursor: pointer; }

        /* 手机端适配菜单开关 */
        #menu-toggle { display: none; font-size: 20px; background: transparent; border: none; color: var(--text-main); cursor: pointer; }

        @media (max-width: 768px) {
            #sidebar { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            #menu-toggle { display: block; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <button class="new-chat-btn" onclick="startNewChat()">➕ 新建对话</button>
        <div id="history-list"></div>
    </div>

    <div id="main-container">
        <header>
            <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h3 id="chat-title">新对话</h3>
            <div id="key-btn" onclick="setApiKey()">🔑 API Key</div>
        </header>

        <div id="chat-box"></div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="输入消息..." onkeydown="if(event.key==='Enter') send()">
            <button class="btn" onclick="send()">发送</button>
        </div>
    </div>

<script>
    let apiKey = localStorage.getItem('ds_api_key') || '';
    let conversations = JSON.parse(localStorage.getItem('ds_chats')) || [];
    let currentChatId = null;

    // 初始化加载
    window.onload = () => {
        renderHistory();
        if(conversations.length > 0) {
            switchChat(conversations[0].id);
        } else {
            startNewChat();
        }
    };

    function setApiKey() {
        const key = prompt("请输入你的 DeepSeek API Key:", apiKey);
        if(key !== null) { apiKey = key.trim(); localStorage.setItem('ds_api_key', apiKey); }
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    // 新建对话
    function startNewChat() {
        currentChatId = 'chat_' + Date.now();
        const newChat = { id: currentChatId, title: "新对话", messages: [] };
        conversations.unshift(newChat);
        saveAndRefresh();
        switchChat(currentChatId);
    }

    // 切换对话
    function switchChat(id) {
        currentChatId = id;
        const chat = conversations.find(c => c.id === id);
        document.getElementById('chat-title').innerText = chat.title;
        
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML = '';
        if(chat.messages.length === 0) {
            appendMsg("你好！我是你的专属 DeepSeek 助理，有什么可以帮你的吗？", "assistant");
        } else {
            chat.messages.forEach(m => appendMsg(m.content, m.role));
        }
        
        renderHistory();
        document.getElementById('sidebar').classList.remove('open'); // 手机端选完自动收起
    }

    // 删除对话
    function deleteChat(id, event) {
        event.stopPropagation();
        conversations = conversations.filter(c => c.id !== id);
        saveAndRefresh();
        if(currentChatId === id) {
            if(conversations.length > 0) switchChat(conversations[0].id);
            else startNewChat();
        }
    }

    async function send() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if(!text) return;
        if(!apiKey) { alert('请先配置 API Key！'); return; }

        appendMsg(text, 'user');
        input.value = '';

        const chat = conversations.find(c => c.id === currentChatId);
        chat.messages.push({ role: "user", content: text });
        
        // 如果是第一句，自动更新标题
        if(chat.title === "新对话") { chat.title = text.substring(0, 10); }

        const aiDiv = appendMsg("思考中...", 'assistant');
        saveAndRefresh();

        try {
            const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model: "deepseek-chat", messages: chat.messages, stream: false })
            });
            const data = await res.json();
            if(res.ok) {
                const reply = data.choices[0].message.content;
                aiDiv.innerText = reply;
                chat.messages.push({ role: "assistant", content: reply });
            } else {
                aiDiv.innerText = "出错了: " + data.error.message;
            }
        } catch(e) {
            aiDiv.innerText = "网络异常: " + e.message;
        }
        saveAndRefresh();
    }

    function appendMsg(text, role) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div;
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        conversations.forEach(c => {
            const div = document.createElement('div');
            div.className = `history-item ${c.id === currentChatId ? 'active' : ''}`;
            div.onclick = () => switchChat(c.id);
            div.innerHTML = `<span>💬 ${c.title}</span><button class="delete-btn" onclick="deleteChat('${c.id}', event)">🗑️</button>`;
            list.appendChild(div);
        });
    }

    function saveAndRefresh() {
        localStorage.setItem('ds_chats', JSON.stringify(conversations));
        renderHistory();
    }
</script>
</body>
</html>
