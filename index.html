<!DOCTYPE html>
<html lang="zh-CN">
<head>
<link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek 便携版</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #f5f7fa;
            --chat-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #2f54eb;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #141414;
                --chat-bg: #1f1f1f;
                --text-color: #e8e8e8;
                --primary-color: #177ddc;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: var(--chat-bg);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30303033;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            word-break: break-word;
            line-height: 1.5;
        }
        .user {
            background-color: var(--primary-color);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .assistant {
            background-color: var(--chat-bg);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        #input-container {
            padding: 12px;
            background-color: var(--chat-bg);
            display: flex;
            gap: 8px;
            border-top: 1px solid #30303033;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        input, button {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        input[type="text"] {
            flex: 1;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: none;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        #key-mgr {
            font-size: 12px;
            padding: 4px 8px;
            background: #ff4d4f;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }
        #key-mgr.ready { background: #52c41a; }
    </style>
</head>
<body>

<header>
    <h3>DeepSeek AI</h3>
    <div id="key-mgr" onclick="manageKey()">🔑 设置 API Key</div>
</header>

<div id="chat-container">
    <div class="message assistant">你好！请先点击右上角配置你的 DeepSeek API Key，然后即可开始对话。</div>
</div>

<div id="input-container">
    <input type="text" id="user-input" placeholder="输入消息..." onkeydown="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">发送</button>
</div>

<script>
    let apiKey = localStorage.getItem('ds_api_key') || '';
    const chatContainer = document.getElementById('chat-container');
    const updateKeyBtn = () => {
        const btn = document.getElementById('key-mgr');
        if(apiKey) { btn.innerText = '🟢 Key 已就绪'; btn.className = 'ready'; }
        else { btn.innerText = '🔴 未配置 Key'; btn.className = ''; }
    };
    updateKeyBtn();

    function manageKey() {
        const input = prompt("请输入你的 DeepSeek 官方 API Key:", apiKey);
        if (input !== null) {
            apiKey = input.trim();
            localStorage.setItem('ds_api_key', apiKey);
            updateKeyBtn();
        }
    }

    async function sendMessage() {
        const inputEl = document.getElementById('user-input');
        const text = inputEl.value.trim();
        if (!text) return;
        if (!apiKey) { alert('请先设置 API Key！'); return; }

        // 渲染用户消息
        appendMessage(text, 'user');
        inputEl.value = '';

        // 渲染等待状态
        const aiMessageDiv = appendMessage('思考中...', 'assistant');

        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "deepseek-chat", // 可换 deepseek-reasoner (R1)
                    messages: [
                        { role: "user", content: text }
                    ],
                    stream: false
                })
            });

            const data = await response.json();
            if (response.ok) {
                aiMessageDiv.innerText = data.choices[0].message.content;
            } else {
                aiMessageDiv.innerText = `错误: ${data.error?.message || '请求失败'}`;
            }
        } catch (error) {
            aiMessageDiv.innerText = `网络错误: ${error.message}`;
        }
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function appendMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return div;
    }
</script>
</body>
</html>
